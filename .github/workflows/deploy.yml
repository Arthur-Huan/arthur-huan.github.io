name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you trigger a deploy manually from the Actions tab
  workflow_dispatch:

# Allow this job to clone the repo and create a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; skip queued runs but don't cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build site with Astro
        uses: withastro/action@v6
        # Uncomment and edit these if you need them:
        # with:
        #   path: .                 # Root of your Astro project (default: repo root)
        #   node-version: 24        # Node version (default: 24)
        #   package-manager: npm    # Auto-detected from lockfile if omitted

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
